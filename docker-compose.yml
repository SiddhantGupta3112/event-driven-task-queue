services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    ports: 
      - '5432:5432'
    env_file:
      - .env
    volumes:
      - pg_volume:/var/lib/postgresql/data:rw
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - '6379:6379'
    restart: unless-stopped
    volumes:
      - redis-data:/data

 
  app:
    build: .
    container_name: app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    volumes:
      - .:/app   
    working_dir: /app


  
volumes:
  pg_volume:
  redis-data:
